services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: srr-postgres-dev
    environment:
      POSTGRES_DB: srr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # 5433 避免与本地 PostgreSQL 冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
